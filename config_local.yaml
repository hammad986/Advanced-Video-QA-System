# Video-QA local configuration (mirrors config.yaml content)
# Video processing + local LLM + verification enabled

video:
  input_dir: "data/videos"
  output_dir: "data/audio"
  supported_formats:
    - ".mp4"
    - ".mkv"
    - ".avi"
    - ".mov"
    - ".webm"
    - ".m4a"
    - ".mp3"
    - ".wav"
  audio_settings:
    sample_rate: 16000
    channels: 1
    codec: "pcm_s16le"

speech:
  model_size: "tiny"
  device: "cpu"
  compute_type: "int8"
  beam_size: 1
  best_of: 1
  temperature: 0
  use_whisperx: false
  alignment: false
  vad_filter: true
  vad_min_silence_ms: 700
  restore_punctuation: false
  llm_correction: false

chunking:
  method: "semantic"
  semantic:
    embedding_model: "BAAI/bge-small-en"
    similarity_threshold: 0.3
    min_chunk_words: 50
    max_chunk_words: 300
  fixed:
    chunk_size_words: 150
    overlap_words: 40

embeddings:
  model_name: "BAAI/bge-small-en"
  normalize: true
  batch_size: 32
  device: "cpu"

retrieval:
  vector_db: "faiss"
  top_k: 5
  min_score: 0.0
  index_path: "models/video_index.faiss"
  metadata_path: "models/metadata.pkl"

reranking:
  enabled: false
  model_name: "BAAI/bge-reranker-base"
  top_k: 5
  device: "cpu"

answer:
  use_local: true
  local_model: "phi3:mini"
  ollama_url: "http://localhost:11434/api/generate"
  timeout: 180
  max_tokens: 256
  strict_mode: false
  extractive: false

verification:
  enabled: true
  nli_model: "facebook/bart-large-mnli"
  local_model: "phi3:mini"
  ollama_url: "http://localhost:11434/api/generate"
  timeout: 120

output:
  format: "structured"
  include_citations: true
  include_timestamps: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "video_qa.log"